name: Build Baihu DinD Images

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - manual
      manual_version:
        description: 'Manual version (e.g., 1.0.45 or v1.0.45)'
        required: false
        type: string
      force_rebuild:
        description: 'Force rebuild and overwrite tags'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - '.github/workflows/build.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: microruri/baihu-panel-dind
  BAIHU_BASE: ghcr.io/engigu/baihu

permissions:
  contents: read
  packages: read

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq skopeo
      
      - name: Login to GHCR for inspection
        run: echo ${{ secrets.GITHUB_TOKEN }} | skopeo login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Detect Baihu versions
        id: detect
        env:
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild == true }}
        run: |
          TAGS=("latest" "latest-debian13" "latest-minimal")
          MATRIX_ITEMS="[]"
          
          for TAG in "${TAGS[@]}"; do
            echo "::group::Checking ${TAG}"
            DOCKERFILE="docker/Dockerfile"
            
            INSPECT_OUTPUT=$(skopeo inspect docker://${BAIHU_BASE}:${TAG} 2>&1)
            
            if ! echo "$INSPECT_OUTPUT" | jq -e '.Digest' > /dev/null 2>&1; then
              echo "::warning::Failed to inspect ${TAG}"
              echo "::endgroup::"
              continue
            fi
            
            DIGEST=$(echo "$INSPECT_OUTPUT" | jq -r '.Digest')
            VERSION=$(echo "$INSPECT_OUTPUT" | jq -r '.Labels["org.opencontainers.image.version"] // .Labels["version"] // empty')
            
            if [ -z "$VERSION" ] || [ "$VERSION" == "null" ]; then
              VERSION=$(curl -s "https://api.github.com/repos/engigu/baihu-panel/releases/latest" | jq -r '.tag_name // empty' 2>/dev/null || echo "")
            fi
            
            if [ -z "$VERSION" ] || [ "$VERSION" == "null" ]; then
              VERSION="$(date +%Y%m%d)-$(echo $DIGEST | cut -c1-7)"
            fi

            VERSION_BASE="${VERSION#v}"
            VERSION_BASE="${VERSION_BASE#V}"
            VERSION_BASE="${VERSION_BASE%-debian13}"
            VERSION_BASE="${VERSION_BASE%-minimal}"

            case "${TAG}" in
              latest)
                VERSION_TAG="${VERSION_BASE}"
                ;;
              latest-debian13)
                VERSION_TAG="${VERSION_BASE}-debian13"
                ;;
              latest-minimal)
                VERSION_TAG="${VERSION_BASE}-minimal"
                ;;
              *)
                VERSION_TAG="${VERSION_BASE}"
                ;;
            esac
            
            LOCAL_BASE_DIGEST=$(skopeo inspect docker://${REGISTRY}/${IMAGE_NAME}:${TAG} 2>/dev/null | jq -r '.Labels["org.opencontainers.image.base.digest"] // empty' || echo "")
            
            NEED_BUILD="false"
            if [ "${FORCE_REBUILD}" = "true" ]; then
              NEED_BUILD="true"
            elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
              NEED_BUILD="true"
            elif [ -z "$LOCAL_BASE_DIGEST" ]; then
              NEED_BUILD="true"
            elif [ "$DIGEST" != "$LOCAL_BASE_DIGEST" ]; then
              NEED_BUILD="true"
            fi
            
            echo "Tag: ${TAG}, VersionTag: ${VERSION_TAG}, Need Build: ${NEED_BUILD}, BaseDigest: ${DIGEST}, LocalBaseDigest: ${LOCAL_BASE_DIGEST:-none}"
            
            MATRIX_ITEMS=$(echo "$MATRIX_ITEMS" | jq -c \
              --arg tag "$TAG" \
              --arg version "$VERSION_TAG" \
              --arg version_base "$VERSION_BASE" \
              --arg digest "$DIGEST" \
              --arg dockerfile "$DOCKERFILE" \
              --arg need_build "$NEED_BUILD" \
              '. + [{"tag": $tag, "version": $version, "version_base": $version_base, "digest": $digest, "dockerfile": $dockerfile, "need_build": ($need_build == "true")}]')
            
            echo "::endgroup::"
          done
          
          echo "matrix=${MATRIX_ITEMS}" >> $GITHUB_OUTPUT
          echo "$MATRIX_ITEMS" | jq .
      
      - name: Summary
        run: |
          echo "| Tag | Version | Need Build |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---------|------------|" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.detect.outputs.matrix }}' | jq -r '.[] | "| \(.tag) | \(.version) | \(.need_build) |"' >> $GITHUB_STEP_SUMMARY

  build:
    needs: detect-versions
    if: contains(needs.detect-versions.outputs.matrix, 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-versions.outputs.matrix) }}
    steps:
      - name: Skip if no build needed
        if: matrix.need_build == false
        run: exit 0
      
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}
          labels: |
            org.opencontainers.image.base.name=${{ env.BAIHU_BASE }}:${{ matrix.tag }}
            org.opencontainers.image.base.digest=${{ matrix.digest }}
          build-args: BAIHU_VERSION=${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Summary
        run: |
          echo "## Built ${{ matrix.tag }} ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ matrix.version }}" >> $GITHUB_STEP_SUMMARY

  manual-build:
    if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'manual' && inputs.manual_version != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | skopeo login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Build version
        id: version
        run: |
          VERSION="${{ inputs.manual_version }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION#V}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building: ${VERSION}"
      
      - name: Build all variants
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VARIANTS=("" "-debian13" "-minimal")
          
          for SUFFIX in "${VARIANTS[@]}"; do
            TAG="${VERSION}${SUFFIX}"
            echo "::group::Building ${TAG}"
            
            if skopeo inspect docker://${BAIHU_BASE}:v${VERSION}${SUFFIX} > /dev/null 2>&1; then
              UPSTREAM_TAG="v${VERSION}${SUFFIX}"
              echo "Using upstream tag: ${UPSTREAM_TAG}"
            elif skopeo inspect docker://${BAIHU_BASE}:${VERSION}${SUFFIX} > /dev/null 2>&1; then
              UPSTREAM_TAG="${VERSION}${SUFFIX}"
              echo "Using upstream tag: ${UPSTREAM_TAG}"
            elif skopeo inspect docker://${BAIHU_BASE}:latest${SUFFIX} > /dev/null 2>&1; then
              UPSTREAM_TAG="latest${SUFFIX}"
              echo "Using upstream tag: ${UPSTREAM_TAG}"
            else
              echo "::warning::Upstream not found for ${TAG}"
              echo "::endgroup::"
              continue
            fi
            UPSTREAM_DIGEST=$(skopeo inspect docker://${BAIHU_BASE}:${UPSTREAM_TAG} | jq -r '.Digest // empty')
            DOCKERFILE="docker/Dockerfile"
            echo "Using Dockerfile: ${DOCKERFILE}"
            
            docker buildx build \
              -f ${DOCKERFILE} \
              --platform linux/amd64,linux/arm64 \
              --push \
              -t ${REGISTRY}/${IMAGE_NAME}:${TAG} \
              --label org.opencontainers.image.base.name=${BAIHU_BASE}:${UPSTREAM_TAG} \
              --label org.opencontainers.image.base.digest=${UPSTREAM_DIGEST} \
              --build-arg BAIHU_VERSION=${UPSTREAM_TAG} \
              .
            
            echo "::endgroup::"
          done
      
      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Manual Build ✅" >> $GITHUB_STEP_SUMMARY
          echo "- ${REGISTRY}/${IMAGE_NAME}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- ${REGISTRY}/${IMAGE_NAME}:${VERSION}-debian13" >> $GITHUB_STEP_SUMMARY
          echo "- ${REGISTRY}/${IMAGE_NAME}:${VERSION}-minimal" >> $GITHUB_STEP_SUMMARY
