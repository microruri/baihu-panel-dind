name: Build Baihu DinD Images

on:
  workflow_dispatch:
    inputs:
      manual_version:
        description: 'Manual version (e.g., 1.0.45 or v1.0.45)'
        required: false
        type: string
      force_rebuild:
        description: 'Force rebuild and overwrite tags'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - '.github/workflows/build.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: microruri/baihu-panel-dind
  BAIHU_BASE: ghcr.io/engigu/baihu

permissions:
  contents: read
  packages: read

jobs:
  collect-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      has_build: ${{ steps.collect.outputs.has_build }}
    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq skopeo
      
      - name: Login to GHCR for inspection
        run: echo ${{ secrets.GITHUB_TOKEN }} | skopeo login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Collect versions and build matrix
        id: collect
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_VERSION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.manual_version || '' }}
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild == true }}
        run: |
          set -euo pipefail

          MATRIX_ITEMS='[]'
          RELEASE_VERSION_BASE=""

          normalize_version_base() {
            local value="${1:-}"
            value="${value#v}"
            value="${value#V}"
            value="${value%-debian13}"
            value="${value%-minimal}"
            printf '%s\n' "${value}"
          }

          suffix_for_floating_tag() {
            case "${1}" in
              latest) printf '%s\n' "" ;;
              latest-debian13) printf '%s\n' "-debian13" ;;
              latest-minimal) printf '%s\n' "-minimal" ;;
              *) printf '%s\n' "" ;;
            esac
          }

          version_tag_from_base_and_suffix() {
            local base="${1:-}"
            local suffix="${2:-}"
            if [ -z "${base}" ]; then
              printf '%s\n' ""
              return
            fi
            printf '%s\n' "${base}${suffix}"
          }

          version_from_json() {
            local json="${1}"
            jq -r '.Labels["org.opencontainers.image.version"] // .Labels["version"] // empty' <<< "${json}"
          }

          digest_from_json() {
            local json="${1}"
            jq -r '.Digest // empty' <<< "${json}"
          }

          inspect_image_json() {
            local ref="${1}"
            local out=""
            if out="$(skopeo inspect "docker://${ref}" 2>/dev/null)"; then
              printf '%s\n' "${out}"
              return 0
            fi
            return 1
          }

          get_release_version_base() {
            if [ -n "${RELEASE_VERSION_BASE}" ]; then
              printf '%s\n' "${RELEASE_VERSION_BASE}"
              return
            fi
            local release_tag=""
            release_tag="$(curl -fsSL "https://api.github.com/repos/engigu/baihu-panel/releases/latest" | jq -r '.tag_name // empty' 2>/dev/null || true)"
            RELEASE_VERSION_BASE="$(normalize_version_base "${release_tag}")"
            printf '%s\n' "${RELEASE_VERSION_BASE}"
          }

          append_item() {
            local variant="${1}"
            local floating_tag="${2}"
            local version_tag="${3}"
            local upstream_tag="${4}"
            local version_base="${5}"
            local digest="${6}"
            local need_build="${7}"
            local reason="${8}"

            MATRIX_ITEMS=$(echo "${MATRIX_ITEMS}" | jq -c \
              --arg variant "${variant}" \
              --arg floating_tag "${floating_tag}" \
              --arg version_tag "${version_tag}" \
              --arg upstream_tag "${upstream_tag}" \
              --arg version_base "${version_base}" \
              --arg digest "${digest}" \
              --arg need_build "${need_build}" \
              --arg reason "${reason}" \
              '. + [{
                "variant": $variant,
                "floating_tag": $floating_tag,
                "version_tag": $version_tag,
                "upstream_tag": $upstream_tag,
                "version_base": $version_base,
                "digest": $digest,
                "need_build": ($need_build == "true"),
                "reason": $reason
              }]')
          }

          collect_auto_variants() {
            local floating_tag=""
            local suffix=""
            local upstream_json=""
            local upstream_digest=""
            local upstream_version_raw=""
            local upstream_version_base=""
            local local_json=""
            local local_exists=""
            local local_version_raw=""
            local local_version_base=""
            local version_tag=""
            local need_build=""
            local reason=""

            for floating_tag in latest latest-debian13 latest-minimal; do
              suffix="$(suffix_for_floating_tag "${floating_tag}")"
              echo "::group::Collect ${floating_tag}"

              if ! upstream_json="$(inspect_image_json "${BAIHU_BASE}:${floating_tag}")"; then
                append_item "${floating_tag}" "${floating_tag}" "" "" "" "" "false" "upstream_floating_missing"
                echo "::warning::Upstream tag missing: ${floating_tag}"
                echo "::endgroup::"
                continue
              fi

              upstream_digest="$(digest_from_json "${upstream_json}")"
              upstream_version_raw="$(version_from_json "${upstream_json}")"
              upstream_version_base="$(normalize_version_base "${upstream_version_raw}")"
              if [ -z "${upstream_version_base}" ]; then
                upstream_version_base="$(get_release_version_base)"
              fi
              version_tag="$(version_tag_from_base_and_suffix "${upstream_version_base}" "${suffix}")"

              local_exists="false"
              local_version_base=""
              if local_json="$(inspect_image_json "${REGISTRY}/${IMAGE_NAME}:${floating_tag}")"; then
                local_exists="true"
                local_version_raw="$(version_from_json "${local_json}")"
                local_version_base="$(normalize_version_base "${local_version_raw}")"
              fi

              need_build="false"
              reason="version_unchanged"
              if [ "${FORCE_REBUILD}" = "true" ]; then
                need_build="true"
                reason="force_rebuild"
              elif [ "${EVENT_NAME}" = "push" ]; then
                need_build="true"
                reason="push_trigger"
              elif [ -z "${version_tag}" ]; then
                need_build="false"
                reason="upstream_version_unresolved"
              elif [ "${local_exists}" != "true" ]; then
                need_build="true"
                reason="local_floating_missing"
              elif [ -z "${local_version_base}" ]; then
                need_build="true"
                reason="local_version_unresolved"
              elif [ "${upstream_version_base}" != "${local_version_base}" ]; then
                need_build="true"
                reason="upstream_version_changed"
              fi

              append_item "${floating_tag}" "${floating_tag}" "${version_tag}" "${floating_tag}" "${upstream_version_base}" "${upstream_digest}" "${need_build}" "${reason}"
              echo "version_tag=${version_tag} need_build=${need_build} reason=${reason}"
              echo "::endgroup::"
            done
          }

          collect_manual_variants() {
            local manual_version_base=""
            local suffix=""
            local version_tag=""
            local upstream_tag=""
            local upstream_json=""
            local upstream_digest=""
            local need_build=""
            local reason=""

            manual_version_base="$(normalize_version_base "${MANUAL_VERSION_INPUT}")"
            if [ -z "${manual_version_base}" ]; then
              echo "::error::Invalid manual_version: ${MANUAL_VERSION_INPUT}"
              exit 1
            fi

            for suffix in "" "-debian13" "-minimal"; do
              version_tag="${manual_version_base}${suffix}"
              echo "::group::Collect manual ${version_tag}"
              upstream_tag=""

              if inspect_image_json "${BAIHU_BASE}:v${manual_version_base}${suffix}" >/dev/null; then
                upstream_tag="v${manual_version_base}${suffix}"
              elif inspect_image_json "${BAIHU_BASE}:${manual_version_base}${suffix}" >/dev/null; then
                upstream_tag="${manual_version_base}${suffix}"
              fi

              if [ -z "${upstream_tag}" ]; then
                append_item "${version_tag}" "" "${version_tag}" "" "${manual_version_base}" "" "false" "upstream_version_tag_not_found"
                echo "::warning::Upstream manual tag missing for ${version_tag}"
                echo "::endgroup::"
                continue
              fi

              upstream_json="$(inspect_image_json "${BAIHU_BASE}:${upstream_tag}")"
              upstream_digest="$(digest_from_json "${upstream_json}")"

              if [ "${FORCE_REBUILD}" = "true" ]; then
                need_build="true"
                reason="manual_force_rebuild"
              elif inspect_image_json "${REGISTRY}/${IMAGE_NAME}:${version_tag}" >/dev/null; then
                need_build="false"
                reason="already_published"
              else
                need_build="true"
                reason="manual_version_missing_locally"
              fi

              append_item "${version_tag}" "" "${version_tag}" "${upstream_tag}" "${manual_version_base}" "${upstream_digest}" "${need_build}" "${reason}"
              echo "upstream_tag=${upstream_tag} need_build=${need_build} reason=${reason}"
              echo "::endgroup::"
            done
          }

          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${MANUAL_VERSION_INPUT}" ]; then
            collect_manual_variants
          else
            collect_auto_variants
          fi

          HAS_BUILD="$(echo "${MATRIX_ITEMS}" | jq -r 'any(.[]; .need_build == true)')"
          echo "matrix=${MATRIX_ITEMS}" >> "${GITHUB_OUTPUT}"
          echo "has_build=${HAS_BUILD}" >> "${GITHUB_OUTPUT}"
          echo "${MATRIX_ITEMS}" | jq .
      
      - name: Summary
        run: |
          {
            echo "| Variant | Floating Tag | Version Tag | Upstream Tag | Need Build | Reason |"
            echo "|---------|--------------|-------------|--------------|------------|--------|"
            echo '${{ steps.collect.outputs.matrix }}' | jq -r '.[] | "| \(.variant) | \(.floating_tag) | \(.version_tag) | \(.upstream_tag) | \(.need_build) | \(.reason) |"'
          } >> "${GITHUB_STEP_SUMMARY}"

  build:
    needs: collect-versions
    if: needs.collect-versions.outputs.has_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.collect-versions.outputs.matrix) }}
    steps:
      - name: Skip if no build needed
        if: matrix.need_build == false
        run: exit 0
      
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push
        env:
          FLOATING_TAG: ${{ matrix.floating_tag }}
          VERSION_TAG: ${{ matrix.version_tag }}
          UPSTREAM_TAG: ${{ matrix.upstream_tag }}
          UPSTREAM_DIGEST: ${{ matrix.digest }}
        run: |
          set -euo pipefail
          TAGS=("${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}")
          if [ -n "${FLOATING_TAG}" ]; then
            TAGS+=("${REGISTRY}/${IMAGE_NAME}:${FLOATING_TAG}")
          fi

          BUILD_CMD=(
            docker buildx build
            -f docker/Dockerfile
            --platform "linux/amd64,linux/arm64"
            --push
            --label "org.opencontainers.image.base.name=${BAIHU_BASE}:${UPSTREAM_TAG}"
            --label "org.opencontainers.image.base.digest=${UPSTREAM_DIGEST}"
            --label "org.opencontainers.image.version=${VERSION_TAG}"
            --label "version=${VERSION_TAG}"
            --build-arg "BAIHU_VERSION=${UPSTREAM_TAG}"
            --cache-from "type=gha"
            --cache-to "type=gha,mode=max"
          )

          for tag in "${TAGS[@]}"; do
            BUILD_CMD+=(-t "${tag}")
          done
          BUILD_CMD+=(.)
          "${BUILD_CMD[@]}"
      
      - name: Summary
        env:
          FLOATING_TAG: ${{ matrix.floating_tag }}
          VERSION_TAG: ${{ matrix.version_tag }}
          UPSTREAM_TAG: ${{ matrix.upstream_tag }}
        run: |
          {
            echo "## Built ${VERSION_TAG} ✅"
            echo "- Upstream: ${UPSTREAM_TAG}"
            if [ -n "${FLOATING_TAG}" ]; then
              echo "- Floating tag: ${FLOATING_TAG}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
